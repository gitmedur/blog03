apiVersion: apps/v1
kind: Deployment
metadata:
  name: drift-exporter
  namespace: iris
  labels:
    app.kubernetes.io/name: drift-exporter
    app.kubernetes.io/component: monitoring
    app.kubernetes.io/part-of: iris-mlops
spec:
  replicas: 1

  selector:
    matchLabels:
      app.kubernetes.io/name: drift-exporter

  template:
    metadata:
      labels:
        app.kubernetes.io/name: drift-exporter
        app.kubernetes.io/component: monitoring
        app.kubernetes.io/part-of: iris-mlops

    spec:
      containers:
        - name: drift-exporter

          # Replace this with your actual exporter image.
          image: image-registry.openshift-image-registry.svc:5000/iris/drift-exporter:latest
          imagePullPolicy: Always

          ports:
            - name: metrics
              containerPort: 8080
              protocol: TCP

          envFrom:
            - secretRef:
                name: pipeline-artifacts-iris

          env:
            - name: AWS_S3_METRICS_KEY
              value: metrics/iris_metrics.json

          readinessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3

          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi

          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault

---
apiVersion: v1
kind: Service
metadata:
  name: drift-exporter
  namespace: iris
  labels:
    app.kubernetes.io/name: drift-exporter
    app.kubernetes.io/component: monitoring
    app.kubernetes.io/part-of: iris-mlops

    # ServiceMonitor uses this label as the Prometheus job name.
    monitoring-job: iris-drift-exporter

spec:
  selector:
    app.kubernetes.io/name: drift-exporter

  ports:
    - name: metrics
      port: 8080
      targetPort: metrics
      protocol: TCP
