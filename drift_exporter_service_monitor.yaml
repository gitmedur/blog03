apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: drift-exporter
  namespace: iris
  labels:
    app.kubernetes.io/name: drift-exporter
    app.kubernetes.io/component: monitoring
    app.kubernetes.io/part-of: iris-mlops

spec:
  jobLabel: monitoring-job

  selector:
    matchLabels:
      app.kubernetes.io/name: drift-exporter

  endpoints:
    - port: metrics
      path: /metrics
      scheme: http
      interval: 30s
      scrapeTimeout: 10s
